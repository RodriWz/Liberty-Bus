<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Prima Nusantara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; }
        .hover-scale:hover { transform: scale(1.05); }
        .hover-lift:hover { transform: translateY(-8px); box-shadow: 0 20px 30px -12px rgba(0,0,0,0.15); }
        .transition { transition: all 0.3s ease; }
        .gradient-text { background: linear-gradient(135deg, #D32F2F, #F57C00); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .shadow-custom { box-shadow: 0 25px 40px -12px rgba(0,0,0,0.25); }
        .animate-fade-in { animation: fadeInUp 0.6s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav id="navbar" class="sticky top-0 z-50"></nav>
    <main>
        <section id="home"></section>
        <section id="layanan" class="py-20 bg-white"></section>
        <section id="armada" class="py-20 bg-gray-50"></section>
        <section id="testimoni" class="py-20 bg-orange-50"></section>
        <section id="kontak"></section>
    </main>
    <footer id="footer"></footer>

    <!-- LOAD FILE JS DENGAN URUTAN YANG BENAR -->
    <script src="js/entities/models.js"></script>
    <script src="js/utils/helpers.js"></script>
    <script src="js/data/repository.js"></script>
    <script src="js/renderers/navbar.js"></script>
    <script src="js/renderers/hero.js"></script>
    <script src="js/renderers/services.js"></script>
    <script src="js/renderers/fleets.js"></script>
    <script src="js/renderers/testimonials.js"></script>
    <script src="js/renderers/cta.js"></script>
    <script src="js/renderers/footer.js"></script>
    <script src="js/renderers/map.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
